name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-scan:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '2.2.x'

    - name: Restore Dependencies
      run: dotnet restore simple-transaction-processing.sln

    - name: Build Application
      run: dotnet build simple-transaction-processing.sln --no-restore

    - name: Run Tests
      run: dotnet test simple-transaction-processing.sln --no-build

    - name: Build Docker Image
      run: docker build -t simple-transaction:v1 .

    - name: Install Trivy
      run: |
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    - name: Trivy Scan
      run: trivy image simple-transaction:v1
